---
# Opinionated 2-VM router lab:
# - router-test-1 acts as the router
# - router-peer-1 acts as a downstream host on the same experimental LAN
# - bridge1005 gives the router a second experimental segment for uplink or
#   route-policy experiments without touching production VLANs
router_lab_hypervisor_host: ronny-1
router_lab_vms:
  - hostname: router-test-1
    primary_bridge: bridge0
    cloud_init_networks:
      - name: enp1s0
        addresses:
          - "{{ router_lab_management_address }}/24"
        gateway4: "{{ router_lab_management_gateway }}"
      - name: enp2s0
        addresses:
          - 192.168.103.1/24
        optional: true
      - name: enp3s0
        addresses:
          - 192.168.100.1/24
        optional: true
    extra_nics:
      - bridge: bridge1004
      - bridge: bridge1005
  - hostname: router-peer-1
    cloud_init_primary_dhcp: true
    primary_bridge: bridge0
    extra_nics:
      - bridge: bridge1004
