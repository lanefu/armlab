---
- hosts: "{{ hypervisor_host | default('ronny-1') }}"
  tasks:
    - name: "Provision {{ test_vm_hostname | default('router-test-1') }}"
      include_role:
        name: lanefu.armlab.provision_kvm_guest
      vars:
        provision_kvm_guest_hostname: "{{ test_vm_hostname | default('router-test-1') }}"
        provision_kvm_guest_image_folder: /mnt/cheapo/images
        provision_kvm_guest_machine_folder: /mnt/cheapo/machines/ktest
        provision_kvm_guest_base_image: debian-13-generic-arm64-daily.qcow2
        provision_kvm_guest_image_file: "{{ test_vm_hostname | default('router-test-1') }}.img.qcow2"
        provision_kvm_guest_image_format: qcow2
        provision_kvm_guest_image_size: 20G
        provision_kvm_guest_smp: 2
        provision_kvm_guest_memory: 2048
        provision_kvm_guest_mac_address: "{{ '52:54:00' | community.general.random_mac(seed=test_vm_hostname | default('router-test-1')) }}"
        provision_kvm_guest_network_bridge: bridge0
        provision_kvm_guest_extra_nics:
          - bridge: "{{ extra_bridge | default('bridge1004') }}"
        provision_kvm_guest_generate_cloud_init_iso: false
        provision_kvm_guest_nocloud_url: https://www.lane-fu.com/qemu-nocloud/lanecloud/
        provision_kvm_guest_instance_id: "{{ test_vm_hostname | default('router-test-1') }}-uuid"
