---
- hosts:
    - k3s_nodes

  vars:
    k3s_become: true
    k3s_etcd_datastore: true
    #k3s_release_version: "v1.30.4+k3s1"
    k3s_server:
      cluster-cidr: 172.31.0.0/16
      tls-san:
        - 172.17.20.40
      disable:
        - traefik
        - servicelb
      flannel-backend: "none"
      node-label:
        - bgp-node=true
    k3s_agent:
      node-label:
        - bgp-node=true

  tasks:
    - name: Provision whole cluster
      import_role:
        name: xanmanning.k3s
      tags:
        - provision
        - k3s

    - name: Increase inotify max_user_instances for Kubernetes
      ansible.posix.sysctl:
        name: fs.inotify.max_user_instances
        value: "8192"
        state: present
        reload: yes
      tags:
        - provision
        - k3s
        - sysctl

    - name: Increase inotify max_user_watches for Kubernetes
      ansible.posix.sysctl:
        name: fs.inotify.max_user_watches
        value: "524288"
        state: present
        reload: yes
      tags:
        - provision
        - k3s
        - sysctl
